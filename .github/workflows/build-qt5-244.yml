name: build-qt5-244

on:
  push:
    branches:
      - master
      - codex/backport-244-download-install-fixes
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-2022
    timeout-minutes: 360
    env:
      BAIN_WIZARD_INTERPRETER_COMMIT: df3372b03b867e58551b63657a99202299e0c9d8
      MOB_COMMIT: 066001efb1a4cfd1b1de6ff22c6061a2851df32d
      MO_BRANCH: 2_4_x
      MO_ORG: ModOrganizer2
      MODORGANIZER_BRANCH: codex/backport-244-download-install-fixes
      MODORGANIZER_ORG: nwn900
      QT_VERSION: 5.15.2
      QT_ARCH: win64_msvc2019_64
      USVFS_BRANCH: 2_4_x

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python 3.8
        uses: actions/setup-python@v5
        with:
          python-version: "3.8"

      - name: Install build prerequisites
        shell: pwsh
        run: |
          choco install 7zip nasm strawberryperl nuget.commandline jom -y --no-progress

      - name: Install Qt 5.15.2
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install aqtinstall
          python -m aqt install-qt windows desktop $env:QT_VERSION $env:QT_ARCH --outputdir C:\Qt -m qtwebengine

      - name: Detect Visual Studio and Windows SDK
        shell: pwsh
        run: |
          $vswhere = Join-Path ${env:ProgramFiles(x86)} "Microsoft Visual Studio\Installer\vswhere.exe"
          if (!(Test-Path $vswhere)) {
            throw "vswhere.exe not found"
          }

          $vs = & $vswhere -products * -nologo -latest -version "[17.0,18.0)" -property installationPath
          if (-not $vs) {
            throw "Visual Studio 2022 not found"
          }

          $sdk = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\Include" -Directory |
            Where-Object { $_.Name -match '^\d+\.\d+\.\d+\.\d+$' } |
            Sort-Object { [version]$_.Name } -Descending |
            Select-Object -First 1 -ExpandProperty Name
          if (-not $sdk) {
            throw "Windows 10 SDK not found"
          }

          "MO2_VS=$vs" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "MO2_SDK=$sdk" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          $qtInstall = Join-Path (Join-Path "C:\Qt" $env:QT_VERSION) "msvc2019_64"
          "MO2_QT_INSTALL=$qtInstall" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Bootstrap mob
        shell: pwsh
        run: |
          $mobRoot = Join-Path $env:RUNNER_TEMP "mob"
          git clone https://github.com/ModOrganizer2/mob $mobRoot
          git -C $mobRoot checkout $env:MOB_COMMIT

          function Replace-InFile {
            param(
              [Parameter(Mandatory = $true)]
              [string]$Path,
              [Parameter(Mandatory = $true)]
              [string]$Needle,
              [Parameter(Mandatory = $true)]
              [string]$Replacement
            )

            $content = Get-Content $Path -Raw
            if (-not $content.Contains($Needle)) {
              throw "Failed to patch $Path"
            }

            $content = $content.Replace($Needle, $Replacement)
            Set-Content -LiteralPath $Path -Value $content -Encoding ascii
          }

          $modTask = Join-Path $mobRoot "src\\tasks\\modorganizer.cpp"
          $modNeedle = '.def("GTEST_ROOT",                gtest::source_path())'
          $modReplacement = @(
            '.def("GTEST_ROOT",                gtest::source_path())'
            '        .def("BUILD_TESTING",             "OFF")'
          ) -join "`r`n"
          Replace-InFile -Path $modTask -Needle $modNeedle -Replacement $modReplacement

          $gtestTask = Join-Path $mobRoot "src\\tasks\\gtest.cpp"
          $gtestNeedle = '.arg("-Wno-deprecated")'
          $gtestReplacement = @(
            '.arg("-Wno-deprecated")'
            '        .def("CMAKE_MSVC_RUNTIME_LIBRARY", "MultiThreaded")'
          ) -join "`r`n"
          Replace-InFile -Path $gtestTask -Needle $gtestNeedle -Replacement $gtestReplacement

          & (Join-Path $mobRoot "bootstrap.ps1")

      - name: Generate mob CI config
        shell: pwsh
        run: |
          $prefix = Join-Path $env:RUNNER_TEMP "mo2-prefix"
          New-Item -ItemType Directory -Path $prefix -Force | Out-Null

          $iniPath = Join-Path $env:RUNNER_TEMP "ci.mob.ini"
          $logPath = Join-Path $prefix "mob-ci.log"

          $content = @(
            "[global]"
            "output_log_level   = 4"
            "file_log_level     = 5"
            "log_file           = $logPath"
            "ignore_uncommitted = true"
            ""
            "[task]"
            "mo_org        = $env:MO_ORG"
            "mo_branch     = $env:MO_BRANCH"
            "no_pull       = false"
            "ignore_ts     = false"
            "revert_ts     = false"
            "git_shallow   = true"
            ""
            "[modorganizer:task]"
            "mo_org    = $env:MODORGANIZER_ORG"
            "mo_branch = $env:MODORGANIZER_BRANCH"
            ""
            "[organizer:task]"
            "mo_org    = $env:MODORGANIZER_ORG"
            "mo_branch = $env:MODORGANIZER_BRANCH"
            ""
            "[installer_omod:task]"
            "enabled = false"
            ""
            "[versions]"
            "vs         = 17"
            "vs_year    = 2022"
            "vs_toolset = 14.3"
            "sdk        = $env:MO2_SDK"
            "qt         = $env:QT_VERSION"
            "qt_vs      = 2019"
            "pyqt       = 5.15.2"
            "pyqt_builder = 1.7.0"
            "pyqt_sip   = 12.8.1"
            "python     = v3.8.7"
            "usvfs      = $env:USVFS_BRANCH"
            ""
            "[paths]"
            "prefix     = $prefix"
            "qt_install = $env:MO2_QT_INSTALL"
            "vs         = $env:MO2_VS"
          ) -join "`r`n"

          Set-Content -LiteralPath $iniPath -Value $content -Encoding ascii

          "MO2_PREFIX=$prefix" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "MO2_INI=$iniPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "MO2_MOB_ROOT=$(Join-Path $env:RUNNER_TEMP 'mob')" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Preseed legacy plugin sources
        shell: pwsh
        run: |
          $superRoot = Join-Path $env:MO2_PREFIX "build\\modorganizer_super"
          $wizardRoot = Join-Path $superRoot "installer_wizard"
          $wizardUrl = "https://github.com/ModOrganizer2/modorganizer-installer_wizard"
          $installerOmodRoot = Join-Path $superRoot "installer_omod"
          $installerOmodUrl = "https://github.com/ModOrganizer2/modorganizer-installer_omod"
          $pluginPythonRoot = Join-Path $superRoot "plugin_python"
          $pluginPythonUrl = "https://github.com/ModOrganizer2/modorganizer-plugin_python"

          New-Item -ItemType Directory -Path $superRoot -Force | Out-Null

          if (!(Test-Path (Join-Path $wizardRoot ".git"))) {
            git clone --branch $env:MO_BRANCH $wizardUrl $wizardRoot
          } else {
            git -C $wizardRoot pull --ff-only $wizardUrl $env:MO_BRANCH
          }

          if (!(Test-Path (Join-Path $installerOmodRoot ".git"))) {
            git clone --branch $env:MO_BRANCH $installerOmodUrl $installerOmodRoot
          } else {
            git -C $installerOmodRoot pull --ff-only $installerOmodUrl $env:MO_BRANCH
          }

          $requirements = Join-Path $wizardRoot "plugin-requirements.txt"
          $content = Get-Content $requirements -Raw
          $needle = 'git+https://github.com/Holt59/bain-wizard-interpreter'
          $replacement = "git+https://github.com/Holt59/bain-wizard-interpreter@$env:BAIN_WIZARD_INTERPRETER_COMMIT"

          if (-not $content.Contains($needle)) {
            throw "Failed to patch $requirements"
          }

          $content = $content.Replace($needle, $replacement)
          Set-Content -LiteralPath $requirements -Value $content -Encoding ascii

          if (!(Test-Path (Join-Path $pluginPythonRoot ".git"))) {
            git clone --branch $env:MO_BRANCH $pluginPythonUrl $pluginPythonRoot
          } else {
            git -C $pluginPythonRoot pull --ff-only $pluginPythonUrl $env:MO_BRANCH
          }

          $converters = Join-Path $pluginPythonRoot "src\\runner\\converters.h"
          $content = Get-Content $converters -Raw
          $needle = '        return wrap<Ws... >::apply(std::forward<T>(t));'
          $replacement = '        return wrap_impl<Ws... >::apply(std::forward<T>(t));'

          if (-not $content.Contains($needle)) {
            throw "Failed to patch $converters"
          }

          $content = $content.Replace($needle, $replacement)
          Set-Content -LiteralPath $converters -Value $content -Encoding ascii

      - name: Seed legacy source archives
        shell: pwsh
        run: |
          function Get-LegacyArchive {
            param(
              [Parameter(Mandatory = $true)]
              [string]$OutFile,
              [Parameter(Mandatory = $true)]
              [string[]]$Urls,
              [scriptblock]$Validate = { param($Path) Test-Path $Path }
            )

            if (Test-Path $OutFile) {
              if (& $Validate $OutFile) {
                return
              }

              Remove-Item $OutFile -Force -ErrorAction SilentlyContinue
            }

            foreach ($url in $Urls) {
              try {
                Invoke-WebRequest $url -MaximumRedirection 5 -OutFile $OutFile
                if ((Get-Item $OutFile).Length -gt 0 -and (& $Validate $OutFile)) {
                  return
                }
              } catch {
                Write-Warning ("Failed to download {0}: {1}" -f $url, $_.Exception.Message)
              }

              if (Test-Path $OutFile) {
                Remove-Item $OutFile -Force -ErrorAction SilentlyContinue
              }
            }

            throw "Unable to seed legacy archive $OutFile"
          }

          $downloads = Join-Path $env:MO2_PREFIX "downloads"
          New-Item -ItemType Directory -Path $downloads -Force | Out-Null

          $archiveValidator = {
            param($Path)

            & 7z.exe t -bd $Path > $null 2>&1
            return ($LASTEXITCODE -eq 0)
          }

          Get-LegacyArchive -OutFile (Join-Path $downloads "zlib-1.2.11.tar.gz") -Urls @(
            "https://www.zlib.net/fossils/zlib-1.2.11.tar.gz"
          ) -Validate $archiveValidator

          Get-LegacyArchive -OutFile (Join-Path $downloads "7z1900-src.7z") -Urls @(
            "https://master.dl.sourceforge.net/project/sevenzip/7-Zip/19.00/7z1900-src.7z?viasf=1",
            "https://downloads.sourceforge.net/project/sevenzip/7-Zip/19.00/7z1900-src.7z"
          ) -Validate $archiveValidator

          Get-LegacyArchive -OutFile (Join-Path $downloads "bzip2-1.0.6.tar.gz") -Urls @(
            "https://sourceware.org/pub/bzip2/bzip2-1.0.6.tar.gz",
            "https://www.sourceware.org/pub/bzip2/bzip2-1.0.6.tar.gz"
          ) -Validate $archiveValidator

          Get-LegacyArchive -OutFile (Join-Path $downloads "explorer++_1.3.5_x64.zip") -Urls @(
            "https://master.dl.sourceforge.net/project/explorerplus/Explorer++/1.3.5/explorer++_1.3.5_x64.zip?viasf=1",
            "https://downloads.sourceforge.net/project/explorerplus/Explorer++/1.3.5/explorer++_1.3.5_x64.zip"
          ) -Validate $archiveValidator

      - name: Patch USVFS with assembler rewrite
        shell: pwsh
        run: |
          $mobExe = Join-Path $env:MO2_MOB_ROOT "mob.exe"
          if (!(Test-Path $mobExe)) {
            throw "mob.exe not found at $mobExe"
          }

          # Prime all task sources first so we can patch usvfs before the build.
          & $mobExe --ini $env:MO2_INI --destination $env:MO2_PREFIX build --no-build-task
          if ($LASTEXITCODE -ne 0) {
            throw "mob source fetch failed"
          }

          $usvfsRoot = Join-Path $env:MO2_PREFIX "build\\usvfs"
          if (!(Test-Path $usvfsRoot)) {
            throw "usvfs source not found at $usvfsRoot"
          }

          Write-Host "Patching USVFS at $usvfsRoot"

          & (Join-Path $env:GITHUB_WORKSPACE "ASSEMBLER\\prepare-usvfs-source.ps1") `
              -MO2Version "2.4.4" `
              -SourceDir $usvfsRoot `
              -UseVcpkgBoost `
              -VcpkgRoot "C:\\vcpkg" `
              -Triplet "x86-windows-static"

      - name: Build with mob
        shell: pwsh
        run: |
          $mobExe = Join-Path $env:MO2_MOB_ROOT "mob.exe"
          if (!(Test-Path $mobExe)) {
            throw "mob.exe not found at $mobExe"
          }

          $mobOutput = & $mobExe --ini $env:MO2_INI --destination $env:MO2_PREFIX build --no-fetch-task 2>&1 | Tee-Object -Variable mobOutput
          if ($LASTEXITCODE -ne 0) {
            throw "mob exited with code $LASTEXITCODE"
          }

          $mobText = $mobOutput | Out-String
          $exe = Join-Path $env:MO2_PREFIX "install\\bin\\ModOrganizer.exe"
          if (!(Test-Path $exe)) {
            throw "mob completed without producing $exe"
          }

          if ($mobText -match '(?m)^there were problems:') {
            $problemLines = $mobText -split '\r?\n' |
              Where-Object { $_ -match 'there were problems:|task is disabled|installer_omod|translations|installer' }

            if ($problemLines) {
              Write-Host "::warning::mob reported non-fatal problems:`n$($problemLines -join "`n")"
            } else {
              Write-Host "::warning::mob reported non-fatal problems, but produced ModOrganizer.exe; continuing to manual installer_omod build and smoke test"
            }
          }

      - name: Build installer_omod manually
        shell: pwsh
        run: |
          $installerOmodRoot = Join-Path $env:MO2_PREFIX "build\\modorganizer_super\\installer_omod"
          $installerOmodBuild = Join-Path $installerOmodRoot "vsbuild-manual"
          $cmake = Join-Path $env:MO2_VS "Common7\\IDE\\CommonExtensions\\Microsoft\\CMake\\CMake\\bin\\cmake.exe"
          $msbuild = Join-Path $env:MO2_VS "MSBuild\\Current\\Bin\\MSBuild.exe"

          if (!(Test-Path $installerOmodRoot)) {
            throw "installer_omod source not found at $installerOmodRoot"
          }

          if (!(Test-Path $cmake)) {
            throw "cmake.exe not found at $cmake"
          }

          if (!(Test-Path $msbuild)) {
            throw "MSBuild.exe not found at $msbuild"
          }

          $boostRoot = Get-Item (Join-Path $env:MO2_PREFIX "build\\boost_*") | Select-Object -First 1 -ExpandProperty FullName
          $boostLibDir = Get-Item (Join-Path $boostRoot "lib64-msvc-*\\lib") | Select-Object -First 1 -ExpandProperty FullName
          $fmtRoot = Get-Item (Join-Path $env:MO2_PREFIX "build\\fmt-*") | Select-Object -First 1 -ExpandProperty FullName
          $spdlogRoot = Get-Item (Join-Path $env:MO2_PREFIX "build\\spdlog-*") | Select-Object -First 1 -ExpandProperty FullName
          $lootPath = Get-Item (Join-Path $env:MO2_PREFIX "build\\libloot-*") | Select-Object -First 1 -ExpandProperty FullName
          $lz4Root = Get-Item (Join-Path $env:MO2_PREFIX "build\\lz4-*") | Select-Object -First 1 -ExpandProperty FullName
          $zlibRoot = Get-Item (Join-Path $env:MO2_PREFIX "build\\zlib-*") | Select-Object -First 1 -ExpandProperty FullName
          $pythonRoot = Get-Item (Join-Path $env:MO2_PREFIX "build\\python-*") | Select-Object -First 1 -ExpandProperty FullName
          $sevenzRoot = Get-Item (Join-Path $env:MO2_PREFIX "build\\7zip-*") | Select-Object -First 1 -ExpandProperty FullName
          $libbsarchRoot = Get-Item (Join-Path $env:MO2_PREFIX "build\\libbsarch-*") | Select-Object -First 1 -ExpandProperty FullName
          $gtestRoot = Get-Item (Join-Path $env:MO2_PREFIX "build\\googletest") | Select-Object -First 1 -ExpandProperty FullName

          if (Test-Path $installerOmodBuild) {
            Remove-Item $installerOmodBuild -Recurse -Force
          }

          & $cmake -S $installerOmodRoot -B $installerOmodBuild -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_INSTALL_PREFIX:PATH="$env:MO2_PREFIX\\install" `
            -DDEPENDENCIES_DIR="$env:MO2_PREFIX\\build" `
            -DBOOST_ROOT="$boostRoot" `
            -DBOOST_LIBRARYDIR="$boostLibDir" `
            -DFMT_ROOT="$fmtRoot" `
            -DSPDLOG_ROOT="$spdlogRoot" `
            -DLOOT_PATH="$lootPath" `
            -DLZ4_ROOT="$lz4Root" `
            -DQT_ROOT="$env:MO2_QT_INSTALL" `
            -DZLIB_ROOT="$zlibRoot" `
            -DPYTHON_ROOT="$pythonRoot" `
            -DSEVENZ_ROOT="$sevenzRoot" `
            -DLIBBSARCH_ROOT="$libbsarchRoot" `
            -DGTEST_ROOT="$gtestRoot" `
            -DCMAKE_INSTALL_MESSAGE=NEVER `
            --log-level=ERROR `
            --no-warn-unused-cli

          if ($LASTEXITCODE -ne 0) {
            throw "CMake configure for installer_omod failed"
          }

          & $msbuild (Join-Path $installerOmodBuild "installer_omod.sln") `
            -nologo `
            -t:restore `
            -property:Configuration=RelWithDebInfo `
            -property:Platform=x64 `
            -property:PlatformToolset=v143 `
            -property:WindowsTargetPlatformVersion=$env:MO2_SDK `
            -verbosity:minimal
          if ($LASTEXITCODE -ne 0) {
            throw "NuGet restore for installer_omod failed"
          }

          & $msbuild (Join-Path $installerOmodBuild "src\\installer_omod.vcxproj") `
            -nologo `
            -maxCpuCount `
            -property:UseMultiToolTask=true `
            -property:EnforceProcessCountAcrossBuilds=true `
            -property:Configuration=RelWithDebInfo `
            -property:Platform=x64 `
            -property:PlatformToolset=v143 `
            -property:WindowsTargetPlatformVersion=$env:MO2_SDK `
            -property:RunCodeAnalysis=false `
            -verbosity:minimal `
            -consoleLoggerParameters:ErrorsOnly
          if ($LASTEXITCODE -ne 0) {
            throw "installer_omod build failed"
          }

          & $cmake --install $installerOmodBuild --config RelWithDebInfo
          if ($LASTEXITCODE -ne 0) {
            throw "installer_omod install failed"
          }

      - name: Smoke test executable
        shell: pwsh
        run: |
          $exe = Join-Path $env:MO2_PREFIX "install\\bin\\ModOrganizer.exe"
          if (!(Test-Path $exe)) {
            throw "ModOrganizer.exe not found"
          }

          & $exe --instance 2>&1 | Out-Null
          if ($LASTEXITCODE -ne 0) {
            throw "ModOrganizer.exe --instance smoke test failed with exit code $LASTEXITCODE"
          }

      - name: Upload build artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mo2-install
          path: ${{ env.MO2_PREFIX }}\install
          if-no-files-found: warn
          retention-days: 14

      - name: Upload mob logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mob-logs
          path: |
            ${{ env.MO2_PREFIX }}\mob-ci.log
            ${{ env.MO2_MOB_ROOT }}\mob.log
          if-no-files-found: warn
          retention-days: 14
